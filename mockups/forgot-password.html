<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaBoard — Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="ideas.html" class="logo">
                <span class="logo-icon">💡</span>
                <span class="logo-text">Idea<span>Board</span></span>
            </a>
        </div>
    </header>

    <main class="container container-narrow">
        <div class="page-header" style="margin-bottom: 1.5rem;">
            <h1 class="page-title">Reset your password</h1>
            <p class="page-subtitle">Enter your email and we'll send you a link to reset your password.</p>
        </div>

        <div class="card">
            <form>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="you@example.com" required>
                </div>

                <button type="submit" class="btn btn-lg">Send Reset Link</button>
            </form>
        </div>

        <p class="footer-text">Remembered it? <a href="login.html">Back to login →</a></p>
    </main>
</body>
</html>
