<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaBoard — Submit Feature Request</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="ideas.html" class="logo">
                <span class="logo-icon">💡</span>
                <span class="logo-text">Idea<span>Board</span></span>
            </a>
            <a href="ideas.html" class="btn btn-ghost btn-sm">Browse Ideas</a>
        </div>
    </header>

    <main class="container container-narrow">
        <div class="page-header" style="margin-bottom: 1.5rem;">
            <h1 class="page-title">Share your idea</h1>
            <p class="page-subtitle">Tell us what you'd like to see. We review every submission and notify you when there's an update.</p>
        </div>

        <div class="card">
            <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding: 0.75rem 1rem; background: var(--primary-light); border-radius: var(--radius-sm); font-size: 0.875rem;">
                <span style="font-size: 1.25rem;">👤</span>
                <span>Logged in as <strong>alex@example.com</strong> · <a href="my-ideas.html" style="color: var(--primary); text-decoration: none;">My Ideas</a></span>
            </div>

            <form>
                <div class="form-group">
                    <label>Title <span class="required">*</span></label>
                    <input type="text" placeholder="e.g. Dark mode for the dashboard" required>
                </div>

                <div class="form-group">
                    <label>Description <span class="required">*</span></label>
                    <textarea placeholder="What problem does this solve? How would your idea help?" required></textarea>
                </div>

                <div class="form-group">
                    <label>Category <span class="required">*</span></label>
                    <select required>
                        <option value="" selected disabled>Select...</option>
                        <option>Feature Request</option>
                        <option>Improvement</option>
                        <option>New Capability</option>
                        <option>Integration Request</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-lg">Submit Idea</button>
            </form>
        </div>

        <p class="footer-text">Want to see what others have suggested? <a href="ideas.html">Browse existing ideas →</a></p>
    </main>
</body>
</html>
