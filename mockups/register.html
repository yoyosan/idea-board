<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaBoard — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="ideas.html" class="logo">
                <span class="logo-icon">💡</span>
                <span class="logo-text">Idea<span>Board</span></span>
            </a>
            <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
        </div>
    </header>

    <main class="container container-narrow">
        <div class="page-header" style="margin-bottom: 1.5rem;">
            <h1 class="page-title">Create your account</h1>
            <p class="page-subtitle">Sign up to submit ideas, vote on requests, and track their progress.</p>
        </div>

        <div class="card">
            <form>
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label>Password <span class="required">*</span></label>
                    <input type="password" placeholder="At least 8 characters" required>
                    <p class="hint">Minimum 8 characters. We'll never share your email.</p>
                </div>

                <button type="submit" class="btn btn-lg">Create Account</button>
            </form>
        </div>

        <p class="footer-text">Already have an account? <a href="login.html">Log in →</a></p>
    </main>
</body>
</html>
